<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Book Service - UrbanChimney</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a class="brand" href="index.html">
        <img src="logo.png" alt="Urban Chimney logo">
        <span>UrbanChimney</span>
      </a>
      <nav class="nav-links">
        <a href="index.html">Welcome</a>
        <a href="home.html">Home</a>
        <a href="booking.html" class="active">Book</a>
        <a href="track.html">Track</a>
        <a href="profile.html">Profile</a>
      </nav>
    </div>
  </header>

  <main class="page-shell">
    <section class="form-card" style="max-width: 760px; margin: 18px auto 0;">
      <h2>Book your chimney service</h2>
      <p class="muted">Fill in your details and we’ll guide the technician to your doorstep.</p>
      <form id="bookingForm">
        <div class="form-grid">
          <div>
            <label for="bookingName">Full name</label>
            <input type="text" id="bookingName" placeholder="Enter your name" required>
          </div>
          <div>
            <label for="bookingMobile">Mobile number</label>
            <input type="tel" id="bookingMobile" maxlength="10" placeholder="Enter 10 digit number" required>
          </div>
          <div>
            <label for="bookingCity">City</label>
            <select id="bookingCity" required>
              <option value="">Choose city</option>
              <option>Hyderabad</option>
              <option>Chennai</option>
              <option>Bangalore</option>
              <option>Pune</option>
            </select>
          </div>
          <div>
            <label for="service">Service type</label>
            <select id="service" required>
              <option value="">Select service</option>
              <option>Chimney Cleaning</option>
              <option>Repair & Maintenance</option>
              <option>Spare Parts</option>
            </select>
          </div>
          <div class="full-width">
            <label for="address">Full address</label>
            <textarea id="address" rows="3" placeholder="Enter complete address" required></textarea>
          </div>
          <div class="full-width">
            <label for="location">Location link</label>
            <input type="text" id="location" placeholder="Location will appear here" readonly>
          </div>
          <div class="full-width">
            <button class="btn btn-secondary" type="button" id="locationButton">Get my location</button>
          </div>
          <div>
            <label for="date">Preferred date</label>
            <input type="date" id="date" required>
          </div>
          <div>
            <label for="time">Preferred time</label>
            <input type="time" id="time" required>
          </div>
        </div>
        <div class="inline-actions">
          <button class="btn btn-primary" type="submit">Continue to payment</button>
          <a class="btn btn-secondary" href="home.html">Back to home</a>
        </div>
      </form>
    </section>
  </main>

  <footer class="footer">
    <div class="footer-brand">
      <img src="logo.png" alt="UrbanChimney logo">
      <span>UrbanChimney</span>
    </div>
    <p>UrbanChimney © 2026 • Easy booking experience.</p>
  </footer>
  <script src="app.js"></script>
</body>
</html>
