<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book Service - UrbanChimney</title>

<style>

/* ===== BACKGROUND ANIMATION ===== */
body{
    margin:0;
    font-family: Arial, sans-serif;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:15px;
    background: linear-gradient(-45deg, #0f172a, #1e3a8a, #0ea5e9, #22c55e);
    background-size: 400% 400%;
    animation: gradientBG 10s ease infinite;
}

@keyframes gradientBG{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

/* ===== FORM CARD ===== */
form{
    width:100%;
    max-width:450px;
    background: rgba(255,255,255,0.12);
    backdrop-filter: blur(12px);
    border-radius:18px;
    padding:22px;
    box-shadow:0 0 25px rgba(0,0,0,0.4);
    border:1px solid rgba(255,255,255,0.2);
}

/* TITLE */
h2{
    text-align:center;
    color:white;
    margin-bottom:18px;
    font-size:24px;
}

/* INPUTS */
input{
    width:100%;
    padding:14px;
    margin:8px 0;
    border:none;
    border-radius:12px;
    font-size:16px;
    outline:none;
    background: rgba(255,255,255,0.85);
}

/* BUTTON */
button{
    width:100%;
    padding:14px;
    margin-top:12px;
    border:none;
    border-radius:12px;
    font-size:18px;
    font-weight:bold;
    color:white;
    background: linear-gradient(90deg,#22c55e,#16a34a);
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform: scale(1.03);
    background: linear-gradient(90deg,#16a34a,#15803d);
}

/* MOBILE PERFECT FIT */
@media (max-width: 480px){
    form{
        max-width:100%;
        padding:18px;
        border-radius:15px;
    }

    h2{
        font-size:20px;
    }

    input{
        padding:12px;
        font-size:15px;
    }

    button{
        font-size:16px;
        padding:12px;
    }
}

</style>
</head>

<body>

<form action="https://formsubmit.co/rajasekhar4003@gmail.com" method="POST">

<h2>🏠 Book UrbanChimney Service</h2>

<input type="text" name="name" placeholder="Name" required>
<input type="text" name="mobile" placeholder="Mobile Number" required>
<input type="text" name="city" placeholder="City" required>
<input type="text" name="service" placeholder="Service Type" required>
<input type="text" name="address" placeholder="Full Address" required>
<input type="text" name="landmark" placeholder="Landmark">
<input type="date" name="date" required>
<input type="time" name="time" required>

<input type="hidden" name="_subject" value="🏠 New UrbanChimney Booking">
<input type="hidden" name="_captcha" value="false">

<button type="submit">Confirm Booking</button>

</form>

</body>
</html>
