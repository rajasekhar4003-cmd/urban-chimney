<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UrbanChimney.in | Home Services</title>

<link rel="stylesheet" href="css/style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

<div class="login-container">

<div class="logo">
<img src="images/logo.png" alt="UrbanChimney Logo">
<h1>UrbanChimney.in</h1>
<p>Clean Air • Safe Home</p>
</div>

<div class="card">

<h2>Welcome</h2>

<form id="loginForm">

<label>Name</label>
<input
type="text"
id="name"
placeholder="Enter your full name"
required>

<label>Mobile Number</label>
<input
type="tel"
id="mobile"
maxlength="10"
placeholder="Enter 10 digit mobile number"
required>

<label>Select City</label>

<select id="city" required>

<option value="">Choose City</option>

<option>Hyderabad</option>

<option>Chennai</option>

<option>Bangalore</option>

</select>

<button type="submit">
Continue
</button>

</form>

</div>

<div class="footer">

<p>✔ Trusted Chimney Experts</p>

<p>✔ Fast Doorstep Service</p>

<p>✔ Genuine Spare Parts</p>

</div>

</div>

<script src="js/app.js"></script>

</body>
</html>
<link rel="stylesheet" href="./style.css">
<script src="./app.js"></script>
