<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment | UrbanChimney</title>

<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="login-container">

<div class="card">

<h2>Payment</h2>

<h3 id="serviceName"></h3>

<p>Select Payment Method</p>

<label>
<input type="radio" name="payment" value="UPI" checked>
💜 UPI
</label>

<br><br>

<label>
<input type="radio" name="payment" value="PhonePe">
🟣 PhonePe
</label>

<br><br>

<label>
<input type="radio" name="payment" value="Google Pay">
🟢 Google Pay
</label>

<br><br>

<label>
<input type="radio" name="payment" value="Paytm">
🔵 Paytm
</label>

<br><br>

<label>
<input type="radio" name="payment" value="Cash After Service">
💵 Cash After Service
</label>

<br><br>

<button onclick="payNow()">
Pay Now
</button>

</div>

</div>

<script>

document.getElementById("serviceName").innerHTML =
localStorage.getItem("selectedService");

function payNow(){

let payment =
document.querySelector('input[name="payment"]:checked').value;

localStorage.setItem("paymentMethod",payment);

// Demo payment
alert("Payment Successful!");

window.location.href="success.html";

}

</script>

</body>
</html>
