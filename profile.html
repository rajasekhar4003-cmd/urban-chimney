<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Profile | UrbanChimney</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body class="profile-page">
  <header class="site-header">
    <div class="header-inner">
      <a class="brand" href="index.html">
        <span class="brand-mark">UC</span>
        <span>UrbanChimney</span>
      </a>
      <nav class="nav-links">
        <a href="home.html">Home</a>
        <a href="booking.html">Booking</a>
        <a href="payment.html">Payment</a>
        <a href="track.html">Tracking</a>
        <a href="profile.html" class="active">Profile</a>
        <button type="button" id="logoutButton">Logout</button>
      </nav>
    </div>
  </header>

  <main class="page-shell">
    <section class="profile-card form-card">
      <div>
        <img class="profile-avatar" src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?auto=format&fit=crop&w=600&q=80" alt="Happy professional customer avatar">
      </div>
      <div>
        <h2>My profile</h2>
        <p class="muted">Your saved customer details and recent visits appear here.</p>
        <div class="form-grid">
          <div class="full-width">
            <label for="profileName">Name</label>
            <input type="text" id="profileName" readonly>
          </div>
          <div class="full-width">
            <label for="profileMobile">Mobile</label>
            <input type="text" id="profileMobile" readonly>
          </div>
          <div class="full-width">
            <label for="profileCity">City</label>
            <input type="text" id="profileCity" readonly>
          </div>
        </div>
        <div class="inline-actions">
          <a class="btn btn-primary" href="track.html">My bookings</a>
          <a class="btn btn-secondary" href="home.html">Back home</a>
        </div>
        <div class="notice" id="bookingHistoryList"></div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="footer-brand">
      <span class="brand-mark">UC</span>
      <span>UrbanChimney</span>
    </div>
    <p>UrbanChimney © 2026 • Profile overview.</p>
  </footer>
  <script src="app.js"></script>
</body>
</html>
