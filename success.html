<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Booking Successful</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a class="brand" href="index.html">
        <img src="logo.png" alt="Urban Chimney logo">
        <span>UrbanChimney</span>
      </a>
    </div>
  </header>

  <main class="page-shell">
    <section class="form-card" style="max-width: 620px; margin: 40px auto 0; text-align: center;">
      <h1 style="font-size: 3rem; margin-bottom: 8px; color: var(--success);">✓</h1>
      <h2>Booking confirmed</h2>
      <p class="muted">Your service request is ready and a technician will contact you shortly.</p>
      <div class="notice">
        <strong>Booking ID:</strong> <span id="successBookingId"></span>
      </div>
      <div class="form-grid" style="margin-top: 18px; text-align: left;">
        <div>
          <label>Service</label>
          <p id="successService" class="muted"></p>
        </div>
        <div>
          <label>Payment</label>
          <p id="successPayment" class="muted"></p>
        </div>
      </div>
      <div class="inline-actions" style="justify-content: center;">
        <a class="btn btn-primary" href="home.html">Back home</a>
        <a class="btn btn-secondary" href="track.html">Track booking</a>
      </div>
    </section>
  </main>
  <footer class="footer">
    <div class="footer-brand">
      <img src="logo.png" alt="UrbanChimney logo">
      <span>UrbanChimney</span>
    </div>
    <p>UrbanChimney © 2026 • Trusted citywide service.</p>
  </footer>
  <script src="app.js"></script>
</body>
</html>
